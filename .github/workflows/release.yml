name: Build and Release

on:
  push:
    branches:
      - main
      - codex/**
      - claude/**
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify learning engine and release smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        persist-credentials: false
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: npm
    - name: Install locked dependencies
      run: npm ci
    - name: Audit production dependencies
      run: npm audit --omit=dev --audit-level=high
    - name: Run engine tests
      run: npm run test:engine
    - name: Run local-day tests
      run: npm run test:local-day
    - name: Run evidence foundation contracts
      run: npm run test:evidence
    - name: Run private evidence commit contracts
      run: npm run test:evidence-commit
    - name: Replay migrations in ephemeral Postgres
      run: bash tests/db/validate-migrations.sh
    - name: Run release smoke
      run: npm run test:release

  build:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        persist-credentials: false
    
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
    
    - name: Get version from manifest
      id: version
      run: |
        VERSION=$(node -p "require('./manifest.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Create extension package
      run: |
        # Remove development files
        rm -rf .git .github backups tests docs/archived
        rm -f .gitignore ARCHITECTURE_ANALYSIS.md
        
        # Create zip for Chrome Web Store
        zip -r linguaflow-v${{ steps.version.outputs.version }}.zip . \
          -x "*.git*" "node_modules/*" "*.DS_Store" "backups/*" "tests/*"
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: linguaflow-v${{ steps.version.outputs.version }}.zip
        body: |
          ## LinguaFlow v${{ steps.version.outputs.version }}
          
          ### 📦 Installation
          
          **Chrome/Edge:**
          1. Download `linguaflow-v${{ steps.version.outputs.version }}.zip`
          2. Extract the ZIP file
          3. Open `chrome://extensions/`
          4. Enable "Developer mode"
          5. Click "Load unpacked"
          6. Select the extracted folder
          
          **Or install from Chrome Web Store:** [Coming Soon]
          
          ### 📝 Changelog
          
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          
          ### 🐛 Report Issues
          
          Found a bug? [Open an issue](https://github.com/${{ github.repository }}/issues)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
