name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */2 * *' # Executa a cada 2 dias à meia-noite
  workflow_dispatch: # Permite executar manualmente para testar

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Acordando o Supabase (Ping Database)
        run: |
          # Fazemos uma chamada à API REST que toca no Banco de Dados
          # Isso é mais garantido do que apenas pingar a URL raiz
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/?apikey=${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json"
    
      - name: Log de Sucesso
        run: echo "Ping realizado com sucesso em $(date)"
