name: Supabase Keep Alive

on:
  schedule:
    # Two real database reads per day, away from GitHub Actions peak times.
    - cron: "17 9,21 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-keep-alive
  cancel-in-progress: true

jobs:
  query-database:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Query keep-alive row
        env:
          SUPABASE_URL: https://qnutoswrufznztoznlql.supabase.co
          # Publishable/anon keys are intentionally safe for public clients.
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFudXRvc3dydWZ6bnp0b3pubHFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzIyODEsImV4cCI6MjA5ODc0ODI4MX0.MdtBZwBnqNDpZ5nTytZDzNFKxHxd1rLmi6wT2MfV-0s
        run: |
          set -euo pipefail

          response="$(curl --silent --show-error --fail \
            --retry 3 \
            --retry-all-errors \
            --max-time 30 \
            --get "$SUPABASE_URL/rest/v1/keep_alive" \
            --data-urlencode "select=id" \
            --data-urlencode "id=eq.1" \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $SUPABASE_ANON_KEY")"

          test "$response" = '[{"id":1}]'
