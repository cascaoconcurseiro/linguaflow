<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaFlow - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 32px; color: #38bdf8; }
        .header-stats { display: flex; gap: 30px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: #4ade80; }
        .stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; }
        
        /* Navigation */
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px;
            border-radius: 12px;
        }
        .nav-btn {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: 2px solid transparent;
            color: #94a3b8;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-btn:hover { background: rgba(56, 189, 248, 0.1); color: #38bdf8; }
        .nav-btn.active { 
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            color: white;
            border-color: #38bdf8;
        }
        
        /* Sections */
        .section { display: none; }
        .section.active { display: block; }
        
        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #38bdf8;
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
        }
        .card-word { font-size: 24px; font-weight: bold; color: #38bdf8; margin-bottom: 10px; }
        .card-translation { font-size: 18px; color: #4ade80; margin-bottom: 10px; }
        .card-context { font-size: 14px; color: #94a3b8; font-style: italic; }
        .card-meta { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            font-size: 12px;
            color: #64748b;
        }
        
        /* Study Mode */
        .study-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.9);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }
        .flashcard {
            background: linear-gradient(135deg, #1e293b, #334155);
            border: 2px solid #38bdf8;
            border-radius: 16px;
            padding: 60px 40px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .flashcard:hover { transform: scale(1.02); }
        .flashcard-word { font-size: 48px; font-weight: bold; color: #38bdf8; margin-bottom: 20px; }
        .flashcard-translation { font-size: 32px; color: #4ade80; margin-bottom: 20px; }
        .flashcard-context { font-size: 18px; color: #94a3b8; font-style: italic; max-width: 600px; }
        
        .study-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .study-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .study-btn.again { background: #ef4444; color: white; }
        .study-btn.hard { background: #f59e0b; color: white; }
        .study-btn.good { background: #10b981; color: white; }
        .study-btn.easy { background: #06b6d4; color: white; }
        .study-btn:hover { transform: scale(1.05); }
        
        /* Phrases */
        .phrase-item {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .phrase-original { font-size: 18px; color: #e2e8f0; margin-bottom: 10px; }
        .phrase-translation { font-size: 16px; color: #38bdf8; margin-bottom: 10px; }
        .phrase-meta { font-size: 12px; color: #64748b; }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }
        .stat-card-value { font-size: 36px; font-weight: bold; color: #38bdf8; margin-bottom: 10px; }
        .stat-card-label { font-size: 14px; color: #94a3b8; text-transform: uppercase; }
        
        /* Progress Bar */
        .progress-bar {
            background: rgba(148, 163, 184, 0.2);
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1d4ed8, #38bdf8);
            transition: width 0.5s;
        }
        
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            color: white;
        }
        .btn-primary:hover { transform: scale(1.05); }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover { background: #dc2626; }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        .empty-state-icon { font-size: 64px; margin-bottom: 20px; }
        .empty-state-text { font-size: 18px; }
        
        /* Filters */
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-select {
            padding: 10px 15px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            cursor: pointer;
        }
        .filter-input {
            flex: 1;
            padding: 10px 15px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
        }
        
        /* Listening Practice */
        .listening-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .listening-card {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }
        .audio-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            transition: all 0.3s;
        }
        .audio-btn:hover { transform: scale(1.1); }
        
        .answer-input {
            width: 100%;
            padding: 15px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 18px;
            text-align: center;
            margin: 20px 0;
        }
        
        /* Chart */
        .chart-container {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .chart-title { font-size: 20px; color: #38bdf8; margin-bottom: 20px; }
        
        /* Decks */
        .deck-item {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .deck-item:hover {
            border-color: #38bdf8;
            transform: translateX(5px);
        }
        .deck-info h3 { font-size: 22px; color: #38bdf8; margin-bottom: 10px; }
        .deck-stats { display: flex; gap: 20px; font-size: 14px; color: #94a3b8; }
        .deck-actions { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⚡ LinguaFlow Dashboard</h1>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalWords">0</div>
                    <div class="stat-label">Palavras</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="dueCards">0</div>
                    <div class="stat-label">Para Revisar</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label">Dias Seguidos</div>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav">
            <button class="nav-btn active" onclick="showSection('study')">🎯 Estudar</button>
            <button class="nav-btn" onclick="showSection('cards')">🎴 Cards</button>
            <button class="nav-btn" onclick="showSection('phrases')">💬 Frases</button>
            <button class="nav-btn" onclick="showSection('listening')">🎧 Listening</button>
            <button class="nav-btn" onclick="showSection('stats')">📊 Estatísticas</button>
            <button class="nav-btn" onclick="showSection('decks')">📚 Decks</button>
        </div>

        <!-- Study Section -->
        <div id="study" class="section active">
            <div class="study-container">
                <div id="studyContent"></div>
            </div>
        </div>

        <!-- Cards Section -->
        <div id="cards" class="section">
            <div class="filters">
                <input type="text" class="filter-input" id="searchCards" placeholder="🔍 Buscar palavras...">
                <select class="filter-select" id="filterStatus">
                    <option value="all">Todos os Status</option>
                    <option value="new">Novos</option>
                    <option value="learning">Aprendendo</option>
                    <option value="review">Revisão</option>
                    <option value="mature">Dominados</option>
                </select>
                <select class="filter-select" id="filterDeck">
                    <option value="all">Todos os Decks</option>
                </select>
            </div>
            <div id="cardsGrid" class="cards-grid"></div>
        </div>

        <!-- Phrases Section -->
        <div id="phrases" class="section">
            <div class="filters">
                <input type="text" class="filter-input" id="searchPhrases" placeholder="🔍 Buscar frases...">
                <button class="btn btn-primary" onclick="exportPhrases()">📥 Exportar</button>
            </div>
            <div id="phrasesList"></div>
        </div>

        <!-- Listening Section -->
        <div id="listening" class="section">
            <div class="listening-container">
                <div id="listeningContent"></div>
            </div>
        </div>

        <!-- Stats Section -->
        <div id="stats" class="section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-card-value" id="statTotal">0</div>
                    <div class="stat-card-label">Total de Palavras</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" id="statNew">0</div>
                    <div class="stat-card-label">Novas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" id="statLearning">0</div>
                    <div class="stat-card-label">Aprendendo</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" id="statMature">0</div>
                    <div class="stat-card-label">Dominadas</div>
                </div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">📈 Progresso nos Últimos 30 Dias</div>
                <canvas id="progressChart" width="800" height="300"></canvas>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">🎯 Taxa de Retenção</div>
                <div id="retentionRate" style="font-size: 48px; text-align: center; color: #4ade80;">0%</div>
            </div>
        </div>

        <!-- Decks Section -->
        <div id="decks" class="section">
            <button class="btn btn-primary" onclick="createDeck()" style="margin-bottom: 20px;">➕ Criar Novo Deck</button>
            <div id="decksList"></div>
        </div>
    </div>

    <script src="anki-dashboard.js"></script>
</body>
</html>
