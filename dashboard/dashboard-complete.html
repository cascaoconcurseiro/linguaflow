<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>LinguaFlow — Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="sidebar">
        <h2 class="logo">⚡ LinguaFlow</h2>
        <nav>
            <button class="nav-btn active" data-tab="review">🃏 Revisão SRS</button>
            <button class="nav-btn" data-tab="decks">📚 Decks</button>
            <button class="nav-btn" data-tab="listening">🎧 Listening</button>
            <button class="nav-btn" data-tab="quiz">🧠 Quiz</button>
            <button class="nav-btn" data-tab="phrasepump">⚡ PhrasePump</button>
            <button class="nav-btn" data-tab="reader">📖 Reader</button>
            <button class="nav-btn" data-tab="vocab">📚 Vocabulário</button>
            <button class="nav-btn" data-tab="stats">📊 Estatísticas</button>
            <button class="nav-btn" data-tab="settings">⚙️ Configurações</button>
        </nav>
        <div class="sidebar-footer">
            <div class="streak-box" id="streak-box">
                <span class="streak-fire">🔥</span>
                <span id="streak-count">0</span>
                <span class="streak-label">dias seguidos</span>
            </div>
            <div style="font-size:12px;color:#64748B;padding:8px 16px 12px;border-top:1px solid rgba(255,255,255,0.05);">
                <div>📦 <span id="sf-total">0</span> palavras</div>
                <div style="margin-top:4px;">⏰ <span id="sf-due">0</span> para revisar</div>
            </div>
        </div>
    </div>

    <main class="content">
        <!-- Conteúdo das abas existentes permanece igual -->
        <!-- Adicionar apenas a nova aba Decks -->
        
        <section id="tab-decks" class="tab-content">
            <div class="header-area">
                <h1>📚 Meus Decks</h1>
                <p>Organize seu vocabulário em decks temáticos, como no Anki.</p>
                <button id="btn-create-deck" class="btn-primary" style="margin-top:12px;">+ Criar Novo Deck</button>
            </div>
            <div id="decks-list" class="decks-grid"></div>
        </section>
    </main>

    <!-- Modal Decks -->
    <div id="deck-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box" style="max-width:500px;">
            <div class="modal-header">
                <h2 id="deck-modal-title">Criar Deck</h2>
                <button class="modal-close" id="deck-modal-close">✕</button>
            </div>
            <div style="padding:20px;">
                <div class="setting-row">
                    <label>Nome do Deck</label>
                    <input type="text" id="deck-name-input" class="setting-input" placeholder="Ex: Verbos Irregulares">
                </div>
                <div class="setting-row">
                    <label>Descrição (opcional)</label>
                    <textarea id="deck-desc-input" class="setting-input" rows="3" placeholder="Descreva o tema deste deck..."></textarea>
                </div>
                <div class="setting-row">
                    <label>Cor do Deck</label>
                    <select id="deck-color-input" class="setting-input">
                        <option value="blue">🔵 Azul</option>
                        <option value="green">🟢 Verde</option>
                        <option value="purple">🟣 Roxo</option>
                        <option value="orange">🟠 Laranja</option>
                        <option value="red">🔴 Vermelho</option>
                        <option value="pink">🩷 Rosa</option>
                    </select>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-action" id="deck-modal-cancel">Cancelar</button>
                <button class="btn-action btn-blue" id="deck-modal-save">Salvar</button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
    <script src="dashboard-extras.js"></script>
    <script src="dashboard-stats.js"></script>
    <script src="dashboard-decks-complete.js"></script>
    <script src="dashboard-phrases-complete.js"></script>
</body>
</html>
