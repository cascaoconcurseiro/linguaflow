<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaFlow V2</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/globals.css" />
  </head>
  <body>
    <!-- Top Navigation Bar -->
    <header class="topbar">
      <div class="logo">
        <div class="logo-icon">LF</div>
        <div class="logo-text">LinguaFlow</div>
      </div>
      <nav class="nav-links">
        <button class="nav-btn active" data-route="home">Início</button>
        <button class="nav-btn" data-route="leagues">Ligas</button>
        <button class="nav-btn" data-route="library">O Cofre</button>
        <button class="nav-btn" data-route="settings">Config</button>
      </nav>
      <div class="stats">
        <div class="stat streak" title="Ofensiva Diária">
          <span class="icon">🔥</span>
          <span id="streak-val">0</span>
        </div>
        <div class="stat due" title="Revisões Pendentes">
          <span class="icon">🎯</span>
          <span id="due-val">0</span>
        </div>
      </div>
    </header>

    <!-- Main Content Area (Views are injected here) -->
    <main id="app-root"></main>

    <!-- Global Toast Container -->
    <div id="toast-container"></div>

    <script type="module" src="js/core/app.js?v=3.0.1"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </body>
</html>
