<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaFlow V2</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="icons/icon48.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://qnutoswrufznztoznlql.supabase.co">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/globals.css" />
  </head>
  <body>
    <!-- Top Navigation Bar -->
    <header class="topbar">
      <div class="logo">
        <img class="logo-img" src="icons/icon128.png" alt="LinguaFlow Logo" style="width: 40px; height: 40px;">
        <div class="logo-text">LinguaFlow</div>
      </div>
      <nav class="nav-links">
        <button class="nav-btn active" data-route="home">Início</button>
        <button class="nav-btn" data-route="stories">Histórias</button>
        <button class="nav-btn" data-route="reader">Leitor</button>
        <button class="nav-btn" data-route="leagues">Ligas</button>
        <button class="nav-btn" data-route="library">O Cofre</button>
        <button class="nav-btn" data-route="stats">Estatísticas</button>
        <button class="nav-btn" data-route="settings">Config</button>
        <button class="nav-btn" id="theme-toggle-btn" style="margin-left: auto; padding: 4px 8px; font-size: 20px;">🌙</button>
        <button class="nav-btn btn-logout" id="logout-btn" style="color: #ff4b4b; font-weight: bold;">Sair</button>
      </nav>
      <div class="stats">
        <div class="stat streak" title="Ofensiva Diária">
          <span class="icon">🔥</span>
          <span id="streak-val">0</span>
        </div>
        <div class="stat due" title="Revisões Pendentes">
          <span class="icon">🎯</span>
          <span id="due-val">0</span>
        </div>
      </div>
    </header>

    <!-- Shell mínimo da sessão: a rota Estudo esconde a navegação global e
         mantém somente saída, estado da sessão e acessos secundários. -->
    <header id="study-focus-header" class="study-focus-header" hidden aria-label="Controles da sessão de estudo">
      <button id="study-focus-exit" class="study-focus-icon-btn" type="button" aria-label="Sair da sessão e voltar ao início">←</button>
      <div class="study-focus-progress" role="status" aria-live="polite">
        <strong>Sessão de estudo</strong>
        <span id="study-focus-status">Um card por vez</span>
        <div id="study-focus-track" class="study-focus-track" role="progressbar" aria-label="Progresso da sessão" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><span></span></div>
      </div>
      <div class="study-focus-menu-wrap">
        <button id="study-focus-menu-toggle" class="study-focus-icon-btn" type="button" aria-label="Abrir menu da sessão" aria-haspopup="menu" aria-expanded="false">⋯</button>
        <div id="study-focus-menu" class="study-focus-menu" role="menu" hidden>
          <button type="button" role="menuitem" data-focus-route="home">Início</button>
          <button type="button" role="menuitem" data-focus-route="library">O Cofre</button>
          <button type="button" role="menuitem" data-focus-route="settings">Configurações</button>
        </div>
      </div>
    </header>

    <!-- Main Content Area (Views are injected here) -->
    <main id="app-root"></main>

    <nav id="mobile-nav" class="mobile-nav" aria-label="Navegação principal">
      <button class="mobile-nav-btn active" type="button" data-route="home"><span aria-hidden="true">⌂</span><span>Início</span></button>
      <button class="mobile-nav-btn" type="button" data-route="stories" data-nav-group="content"><span aria-hidden="true">▶</span><span>Conteúdo</span></button>
      <button class="mobile-nav-btn" type="button" data-route="library"><span aria-hidden="true">◇</span><span>Cofre</span></button>
      <button id="mobile-more-toggle" class="mobile-nav-btn" type="button" aria-haspopup="menu" aria-expanded="false"><span aria-hidden="true">•••</span><span>Mais</span></button>
      <div id="mobile-more-menu" class="mobile-more-menu" role="menu" hidden>
        <button type="button" role="menuitem" data-route="reader">Leitor</button>
        <button type="button" role="menuitem" data-route="leagues">Ligas</button>
        <button type="button" role="menuitem" data-route="stats">Progresso</button>
        <button type="button" role="menuitem" data-route="settings">Configurações</button>
        <button type="button" role="menuitem" id="mobile-theme-toggle">Alternar tema</button>
        <button type="button" role="menuitem" id="mobile-logout">Sair</button>
      </div>
    </nav>

    <!-- Global Toast Container -->
    <div id="toast-container"></div>

    <script type="module" src="js/core/app.js?v=3.0.3"></script>
  </body>
</html>
