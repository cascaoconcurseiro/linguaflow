<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>LinguaFlow</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="icons/icon48.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://qnutoswrufznztoznlql.supabase.co">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/globals.css" />
  </head>
  <body class="lf-auth-pending">
    <!-- Top Navigation Bar -->
    <header class="topbar">
      <div class="logo">
        <img class="logo-img" src="icons/icon128.png" alt="LinguaFlow Logo" style="width: 40px; height: 40px;">
        <div class="logo-text">LinguaFlow</div>
      </div>
      <nav class="nav-links">
        <button class="nav-btn active" type="button" data-route="home">Hoje</button>
        <button class="nav-btn" type="button" data-route="learn" data-nav-group="learn">Aprender</button>
        <button class="nav-btn" type="button" data-route="library">O Cofre</button>
        <button class="nav-btn" type="button" data-route="progress" data-nav-group="progress">Progresso</button>
      </nav>
      <div class="stats">
        <div class="stat streak" title="Ofensiva Diária">
          <span class="icon">🔥</span>
          <span id="streak-val">0</span>
        </div>
        <div class="stat due" title="Revisões Pendentes">
          <span class="icon">🎯</span>
          <span id="due-val">0</span>
        </div>
        <!-- Queixa do dono (17/07): tema e Configurações ficaram escondidos
             atrás do glifo "◉". Os dois voltam como botões diretos e visíveis;
             o menu de perfil segue existindo para Sair. -->
        <button id="topbar-theme-btn" class="topbar-icon-btn" type="button" aria-label="Alternar tema claro/escuro" title="Tema claro/escuro">🌓</button>
        <button id="topbar-settings-btn" class="topbar-icon-btn" type="button" aria-label="Abrir configurações" title="Configurações">⚙️</button>
        <div class="profile-menu-wrap">
          <button id="profile-menu-toggle" class="profile-menu-toggle" type="button" aria-label="Abrir menu do perfil" aria-haspopup="menu" aria-expanded="false" title="Perfil">◉</button>
          <div id="profile-menu" class="profile-menu" role="menu" hidden>
            <button type="button" role="menuitem" data-route="settings">Configurações</button>
            <button type="button" role="menuitem" id="theme-toggle-btn">Alternar tema</button>
            <button type="button" role="menuitem" class="btn-logout" id="logout-btn">Sair</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Shell mínimo da sessão: a rota Estudo esconde a navegação global e
         mantém somente saída, estado da sessão e acessos secundários. -->
    <header id="study-focus-header" class="study-focus-header" hidden aria-label="Controles da sessão de estudo">
      <button id="study-focus-exit" class="study-focus-icon-btn" type="button" aria-label="Sair da sessão e voltar ao início">←</button>
      <div class="study-focus-progress" role="status" aria-live="polite">
        <strong>Sessão de estudo</strong>
        <span id="study-focus-status">Um card por vez</span>
        <div id="study-focus-track" class="study-focus-track" role="progressbar" aria-label="Progresso da sessão" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><span></span></div>
      </div>
      <div class="study-focus-menu-wrap">
        <button id="study-focus-menu-toggle" class="study-focus-icon-btn" type="button" aria-label="Abrir menu da sessão" aria-haspopup="menu" aria-expanded="false">⋯</button>
        <div id="study-focus-menu" class="study-focus-menu" role="menu" hidden>
          <button type="button" role="menuitem" data-focus-route="home">Início</button>
          <button type="button" role="menuitem" data-focus-route="library">O Cofre</button>
          <button type="button" role="menuitem" data-focus-route="settings">Configurações</button>
        </div>
      </div>
    </header>

    <!-- Main Content Area (Views are injected here) -->
    <main id="app-root"></main>

    <nav id="mobile-nav" class="mobile-nav" aria-label="Navegação principal">
      <button class="mobile-nav-btn active" type="button" data-route="home"><span aria-hidden="true">⌂</span><span>Hoje</span></button>
      <button class="mobile-nav-btn" type="button" data-route="learn" data-nav-group="learn"><span aria-hidden="true">▶</span><span>Aprender</span></button>
      <button class="mobile-nav-btn" type="button" data-route="library"><span aria-hidden="true">◇</span><span>Cofre</span></button>
      <button class="mobile-nav-btn" type="button" data-route="progress" data-nav-group="progress"><span aria-hidden="true">↗</span><span>Progresso</span></button>
    </nav>

    <!-- Global Toast Container -->
    <div id="toast-container"></div>

    <script type="module" src="js/core/app.js?v=3.0.28"></script>
  </body>
</html>
