<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova Guia - LinguaFlow</title>
    <link rel="stylesheet" href="css/globals.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
        }
        .container { text-align: center; max-width: 600px; padding: 40px; }
        .time { font-size: 64px; font-weight: 800; letter-spacing: -2px; margin-bottom: 8px; color: var(--color-text); }
        .date { color: var(--color-primary); font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        .card { 
            background: var(--color-surface); 
            border: 2px solid var(--color-border);
            border-bottom: 6px solid var(--color-border); 
            padding: 40px; 
            border-radius: 16px; 
            cursor: pointer; 
            transition: transform 0.2s; 
            position: relative; 
            overflow: hidden; 
        }
        .card:hover { transform: translateY(-2px); border-color: var(--color-primary); }
        .word { font-size: 32px; font-weight: 800; margin-bottom: 12px; }
        .hint { color: var(--color-text-light); font-size: 14px; margin-top: 20px; font-weight: 700; }
        .answer-layer { 
            position: absolute; inset: 0; 
            background: var(--color-surface); 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 40px; 
        }
        .card.revealed .answer-layer { opacity: 1; pointer-events: all; }
        .translation { color: var(--color-primary); font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .context { color: var(--color-text-light); font-size: 16px; font-weight: 600; font-style: italic; }
        
        .actions { display: flex; gap: 12px; margin-top: 30px; }
        
        .header-nav { position: absolute; top: 30px; right: 40px; }
        .header-nav a { 
            color: var(--color-text-light); 
            text-decoration: none; 
            font-weight: 800; 
            padding: 8px 16px; 
            border-radius: 12px; 
            transition: all 0.2s; 
            border: 2px solid transparent;
        }
        .header-nav a:hover { 
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
            background: rgba(88, 204, 2, 0.1);
        }
    </style>
</head>
<body>
    <div class="header-nav">
        <a href="dashboard.html" target="_blank">Acessar Dashboard</a>
    </div>

    <div class="container">
        <div class="time" id="clock">00:00</div>
        <div class="date" id="date">Carregando...</div>

        <div id="study-area" style="display:none">
            <p style="color:var(--color-text-light); margin-bottom:16px; font-size:16px; font-weight: 800;">Revisão Rápida Diária</p>
            <div class="card" id="flashcard">
                <div class="word" id="fc-word">Word</div>
                <div class="hint">Clique em qualquer lugar para revelar a resposta</div>
                
                <div class="answer-layer">
                    <div class="translation" id="fc-trans">Tradução</div>
                    <div class="context" id="fc-ctx">"Contexto"</div>
                    <div class="actions">
                        <button class="btn btn-danger" id="btn-bad" style="flex:1;">Não lembrei</button>
                        <button class="btn btn-primary" id="btn-good" style="flex:1;">Lembrei</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="done-area" style="display:none">
            <div style="font-size:48px; margin-bottom:16px">🔥</div>
            <h3 style="margin-bottom:8px">Você está em dia!</h3>
            <p style="color:var(--color-text-light); font-weight: 700;">Não há cartões pendentes no momento. Continue sua jornada de imersão.</p>
        </div>
    </div>

    <script type="module" src="newtab.js"></script>
</body>
</html>
