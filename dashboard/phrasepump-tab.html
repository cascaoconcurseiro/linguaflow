<!-- ═══ PHRASEPUMP MELHORADO (3 MODOS) ═══ -->
<section id="tab-phrasepump" class="tab-content">
    <div class="header-area">
        <h1>⚡ PhrasePump — Estudo de Frases</h1>
        <p>Método Natural: Compreensão → Listening → Produção</p>
    </div>

    <!-- Seletor de Modo -->
    <div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;">

    <div class="flashcard-container">

        <div class="card-progress">

                <div class="progress-fill" id="phrase-fill"></div>
            </div>

        </div>

        <!-- Card de Frase -->
        <div class="card" id="phrase-container" style="min-height:350px;">
            <!-- Conteúdo dinâmico renderizado pelo JS -->
        </div>

        <!-- Ações -->
        <div class="actions" style="gap:8px;">
            <button id="btn-phrase-audio" class="btn-action btn-blue">🔊 Ouvir</button>
            <button id="btn-phrase-reveal" class="btn-primary">👁 Revelar</button>
            <button id="btn-phrase-know" class="btn-action btn-green" style="display:none;">✅ Já Sei</button>
            <button id="btn-phrase-study" class="btn-action" style="display:none;">📚 Estudar Mais</button>
            <button id="btn-phrase-next" class="btn-action">Próxima →</button>
        </div>
    </div>
</section>
