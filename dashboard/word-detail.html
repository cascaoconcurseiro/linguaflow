<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>LinguaFlow — Palavra</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        body { overflow-y: auto; }
        .word-page { max-width: 860px; margin: 0 auto; padding: 32px 24px 60px; }

        .wp-back { display: inline-flex; align-items: center; gap: 8px; color: #64748B; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; padding: 0; margin-bottom: 28px; transition: color 0.2s; }
        .wp-back:hover { color: #38BDF8; }

        /* Hero */
        .wp-hero { background: #0F172A; border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 32px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; }
        .wp-hero-left { flex: 1; }
        .wp-word { font-size: 52px; font-weight: 800; color: #FFF; letter-spacing: -2px; margin: 0 0 6px; }
        .wp-ipa { font-size: 18px; color: #64748B; font-family: monospace; margin-bottom: 12px; display: block; }
        .wp-translation { font-size: 26px; font-weight: 700; color: #10B981; margin-bottom: 16px; }
        .wp-badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .wp-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .wp-badge-pos  { background: rgba(56,189,248,0.1);  color: #38BDF8;  border: 1px solid rgba(56,189,248,0.2); }
        .wp-badge-cefr { background: rgba(167,139,250,0.15); color: #A78BFA; border: 1px solid rgba(167,139,250,0.3); }
        .wp-badge-freq { background: rgba(245,158,11,0.1);  color: #F59E0B;  border: 1px solid rgba(245,158,11,0.2); }
        .wp-badge-status { background: rgba(16,185,129,0.1); color: #10B981; border: 1px solid rgba(16,185,129,0.2); }

        /* Audio player */
        .wp-audio-row { display: flex; gap: 10px; align-items: center; margin-top: 20px; flex-wrap: wrap; }
        .wp-btn-audio { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #38BDF8, #0EA5E9); color: #0F172A; border: none; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .wp-btn-audio:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(56,189,248,0.35); }
        .wp-btn-audio-tts { background: rgba(56,189,248,0.1); color: #38BDF8; border: 1px solid rgba(56,189,248,0.3); padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .wp-btn-audio-tts:hover { background: rgba(56,189,248,0.2); }

        /* Origem / Vídeo */
        .wp-origin { background: rgba(56,189,248,0.05); border: 1px solid rgba(56,189,248,0.15); border-radius: 14px; padding: 20px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
        .wp-origin-info { flex: 1; }
        .wp-origin-label { font-size: 11px; color: #64748B; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 6px; }
        .wp-context-text { font-size: 15px; color: #CBD5E1; font-style: italic; line-height: 1.6; }
        .wp-context-text strong { color: #38BDF8; font-style: normal; }
        .wp-platform-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; font-size: 12px; color: #94A3B8; margin-top: 8px; }
        .wp-btn-video { display: inline-flex; align-items: center; gap: 8px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; white-space: nowrap; text-decoration: none; }
        .wp-btn-video:hover { background: rgba(239,68,68,0.2); transform: translateY(-1px); }

        /* Seções */
        .wp-section { background: #0F172A; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .wp-section-title { font-size: 13px; font-weight: 700; color: #38BDF8; text-transform: uppercase; letter-spacing: 0.8px; margin: 0 0 18px; display: flex; align-items: center; gap: 8px; }

        /* Definições */
        .wp-def-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .wp-def-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .wp-def-pos { font-size: 11px; color: #A78BFA; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .wp-def-text { font-size: 14px; color: #E2E8F0; line-height: 1.6; }
        .wp-def-example { font-size: 13px; color: #64748B; font-style: italic; margin-top: 4px; padding-left: 12px; border-left: 2px solid rgba(255,255,255,0.1); }

        /* Sinônimos / Antônimos */
        .wp-word-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .wp-chip { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #CBD5E1; padding: 4px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .wp-chip:hover { background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.3); color: #38BDF8; }

        /* Exemplos Linguee */
        .wp-example-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .wp-example-item:last-child { border-bottom: none; }
        .wp-example-en { font-size: 14px; color: #E2E8F0; line-height: 1.6; margin-bottom: 4px; }
        .wp-example-en strong { color: #F59E0B; }
        .wp-example-pt { font-size: 13px; color: #10B981; line-height: 1.5; }
        .wp-example-src { font-size: 11px; color: #475569; margin-top: 2px; }

        /* Gramática */
        .wp-grammar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .wp-grammar-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 16px; }
        .wp-grammar-card h4 { font-size: 11px; color: #38BDF8; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px; }
        .wp-grammar-card p { font-size: 13px; color: #CBD5E1; line-height: 1.5; margin: 0; }
        .wp-grammar-tips { margin-top: 16px; }
        .wp-grammar-tip { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; font-size: 13px; color: #CBD5E1; line-height: 1.5; }
        .wp-grammar-tip::before { content: '→'; color: #38BDF8; flex-shrink: 0; }

        /* YouGlish embed */
        .wp-youglish { width: 100%; height: 380px; border: none; border-radius: 10px; background: #000; }

        /* Loading */
        .wp-loading { text-align: center; padding: 32px; color: #64748B; font-size: 14px; }
        .wp-loading-spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(56,189,248,0.2); border-top-color: #38BDF8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Actions */
        .wp-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 24px; }
    </style>
</head>
<body>
    <div style="display:flex;height:100vh;">
        <div class="sidebar">
            <h2 class="logo">⚡ LinguaFlow</h2>
            <nav>
                <button class="nav-btn" data-href="dashboard.html">← Voltar</button>
                <button class="nav-btn" data-href="dashboard.html#vocab">📚 Vocabulário</button>
                <button class="nav-btn" data-href="dashboard.html#review">🃏 Revisão</button>
            </nav>
        </div>
        <main class="content">
            <div class="word-page" id="word-page">
                <div class="wp-loading">
                    <div class="wp-loading-spinner"></div>
                    <div>Carregando palavra...</div>
                </div>
            </div>
        </main>
    </div>
    <script src="word-detail.js"></script>
</body>
</html>
