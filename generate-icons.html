<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LinguaFlow Icon Generator</title>
<style>
  body { font-family: sans-serif; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%); color: #fff; padding: 40px; text-align: center; min-height: 100vh; }
  h2 { font-size: 32px; margin-bottom: 10px; background: linear-gradient(90deg, #00d4ff, #0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  canvas { border-radius: 16px; margin: 10px; box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3); transition: transform 0.2s; }
  canvas:hover { transform: scale(1.05); }
  .row { display: flex; align-items: flex-end; justify-content: center; gap: 30px; flex-wrap: wrap; margin: 40px 0; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; font-size: 14px; color: #00d4ff; font-weight: 600; }
  button { background: linear-gradient(135deg, #0066ff, #00d4ff); color: #fff; border: none; padding: 16px 40px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4); transition: all 0.3s; }
  button:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(0, 212, 255, 0.6); }
</style>
</head>
<body>
<h2>LinguaFlow Icon Generator</h2>
<div class="row" id="previews"></div>
<button onclick="downloadAll()">⬇ Download All Icons</button>

<svg id="src" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" style="display:none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00d4ff" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="32" fill="url(#bg)"/>
  
  <!-- Radial glow center -->
  <circle cx="64" cy="64" r="50" fill="#00d4ff" opacity="0.15"/>
  <circle cx="64" cy="64" r="35" fill="#ffffff" opacity="0.08"/>

  <!-- Main speech bubble with shadow -->
  <g filter="url(#shadow)">
    <path d="M32 48 Q32 32 48 32 L96 32 Q112 32 112 48 L112 76 Q112 92 96 92 L72 92 L64 108 L60 92 L48 92 Q32 92 32 76 Z"
          fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- Dynamic wave lines with glow -->
  <g filter="url(#glow)">
    <path d="M48 52 Q56 46 64 52 Q72 58 80 52 Q88 46 96 52" 
          stroke="url(#wave)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M48 64 Q56 58 64 64 Q72 70 80 64 Q88 58 96 64" 
          stroke="url(#wave)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path d="M52 76 Q60 70 68 76 Q76 82 84 76" 
          stroke="url(#wave)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>

  <!-- Accent dots for extra pop -->
  <circle cx="44" cy="52" r="3" fill="#00ffff" opacity="0.7"/>
  <circle cx="92" cy="64" r="3" fill="#00ffff" opacity="0.7"/>
  <circle cx="48" cy="76" r="2.5" fill="#ffffff" opacity="0.9"/>
</svg>

<script>
const sizes = [16, 32, 48, 128];

function renderIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const svg = document.getElementById('src');
  const xml = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([xml], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, size, size);
      URL.revokeObjectURL(url);
      resolve(canvas);
    };
    img.src = url;
  });
}

async function init() {
  const container = document.getElementById('previews');
  for (const size of sizes) {
    const canvas = await renderIcon(size);
    canvas.style.width = Math.max(size, 64) + 'px';
    canvas.style.height = Math.max(size, 64) + 'px';
    const item = document.createElement('div');
    item.className = 'item';
    item.appendChild(canvas);
    item.appendChild(document.createTextNode(`${size}×${size}`));
    container.appendChild(item);
  }
}

async function downloadAll() {
  const names = { 16: 'icon16.png', 32: 'icon32.png', 48: 'icon48.png', 128: 'icon128.png' };
  for (const size of sizes) {
    const canvas = await renderIcon(size);
    const a = document.createElement('a');
    a.download = names[size];
    a.href = canvas.toDataURL('image/png');
    a.click();
    await new Promise(r => setTimeout(r, 200));
  }
  // Also save icon.png as 128
  const canvas128 = await renderIcon(128);
  const a = document.createElement('a');
  a.download = 'icon.png';
  a.href = canvas128.toDataURL('image/png');
  a.click();
}

init();
</script>
</body>
</html>
