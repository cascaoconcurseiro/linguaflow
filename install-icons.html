<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LinguaFlow Icon - Auto Install</title>
<style>
body { font-family: sans-serif; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%); color: #fff; padding: 40px; text-align: center; min-height: 100vh; }
h2 { font-size: 32px; margin-bottom: 10px; background: linear-gradient(90deg, #00d4ff, #0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.preview { margin: 40px 0; }
canvas { border-radius: 16px; margin: 10px; box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3); }
button { background: linear-gradient(135deg, #0066ff, #00d4ff); color: #fff; border: none; padding: 16px 40px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 10px; box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4); transition: all 0.3s; }
button:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(0, 212, 255, 0.6); }
.status { margin-top: 20px; padding: 15px; background: rgba(0, 212, 255, 0.1); border-radius: 8px; font-size: 14px; }
</style>
</head>
<body>
<h2>🚀 LinguaFlow Icon Generator</h2>
<div class="preview" id="preview"></div>
<button onclick="downloadAll()">⬇️ Baixar Todos os Ícones</button>
<div class="status" id="status">Clique no botão para baixar os 5 arquivos PNG</div>

<svg id="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" style="display:none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00d4ff" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="32" fill="url(#bg)"/>
  <circle cx="64" cy="64" r="50" fill="#00d4ff" opacity="0.15"/>
  <circle cx="64" cy="64" r="35" fill="#ffffff" opacity="0.08"/>
  <g filter="url(#shadow)">
    <path d="M32 48 Q32 32 48 32 L96 32 Q112 32 112 48 L112 76 Q112 92 96 92 L72 92 L64 108 L60 92 L48 92 Q32 92 32 76 Z" fill="#ffffff" opacity="0.95"/>
  </g>
  <g filter="url(#glow)">
    <path d="M48 52 Q56 46 64 52 Q72 58 80 52 Q88 46 96 52" stroke="url(#wave)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M48 64 Q56 58 64 64 Q72 70 80 64 Q88 58 96 64" stroke="url(#wave)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path d="M52 76 Q60 70 68 76 Q76 82 84 76" stroke="url(#wave)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
  <circle cx="44" cy="52" r="3" fill="#00ffff" opacity="0.7"/>
  <circle cx="92" cy="64" r="3" fill="#00ffff" opacity="0.7"/>
  <circle cx="48" cy="76" r="2.5" fill="#ffffff" opacity="0.9"/>
</svg>

<script>
const sizes = [
  { size: 16, name: 'icon16.png' },
  { size: 32, name: 'icon32.png' },
  { size: 48, name: 'icon48.png' },
  { size: 128, name: 'icon128.png' },
  { size: 128, name: 'icon.png' }
];

function svgToCanvas(size) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    
    const svg = document.getElementById('icon');
    const xml = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, size, size);
      URL.revokeObjectURL(url);
      resolve(canvas);
    };
    img.src = url;
  });
}

async function init() {
  const preview = document.getElementById('preview');
  const canvas = await svgToCanvas(128);
  canvas.style.width = '128px';
  canvas.style.height = '128px';
  preview.appendChild(canvas);
}

async function downloadAll() {
  const status = document.getElementById('status');
  status.textContent = '⏳ Gerando ícones...';
  
  for (let i = 0; i < sizes.length; i++) {
    const { size, name } = sizes[i];
    const canvas = await svgToCanvas(size);
    const link = document.createElement('a');
    link.download = name;
    link.href = canvas.toDataURL('image/png');
    link.click();
    await new Promise(r => setTimeout(r, 300));
  }
  
  status.innerHTML = '✅ <strong>5 arquivos baixados!</strong><br><br>📋 <strong>Próximos passos:</strong><br>1. Mova os 5 arquivos PNG para a pasta do projeto<br>2. Substitua os arquivos antigos<br>3. Vá em chrome://extensions/<br>4. Clique no botão de recarregar (🔄) da extensão LinguaFlow<br>5. O novo ícone aparecerá!';
}

init();
</script>
</body>
</html>
