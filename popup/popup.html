<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
      
      :root {
        --color-primary: #58cc02;
        --color-primary-shadow: #58a700;
        --color-secondary: #1cb0f6;
        --color-secondary-shadow: #1899d6;
        --color-text: #3c3c3c;
        --color-text-light: #777;
        --color-bg: #ffffff;
        --radius: 12px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 340px;
        background: var(--color-bg);
        color: var(--color-text);
        font-family: 'Inter', sans-serif;
        padding: 24px;
        text-align: center;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .header img {
        width: 48px;
        height: 48px;
        border-radius: 12px;
      }
      .header h1 {
        font-size: 24px;
        font-weight: 800;
        color: var(--color-primary);
        letter-spacing: -0.5px;
      }

      p {
        font-size: 14px;
        color: var(--color-text-light);
        margin-bottom: 24px;
        line-height: 1.4;
      }

      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: var(--radius);
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: transform 0.1s;
      }
      .btn:active {
        transform: translateY(4px);
      }
      
      .btn-primary {
        background-color: var(--color-primary);
        color: white;
        border-bottom: 4px solid var(--color-primary-shadow);
        margin-bottom: 12px;
      }
      .btn-primary:hover {
        filter: brightness(1.05);
      }

      .btn-secondary {
        background-color: var(--color-secondary);
        color: white;
        border-bottom: 4px solid var(--color-secondary-shadow);
      }
      .btn-secondary:hover {
        filter: brightness(1.05);
      }

      .tip {
        font-size: 11px;
        color: #afafaf;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="../icon128.png" alt="LF Logo" />
      <h1>LinguaFlow</h1>
    </div>

    <p id="stats-text">
      Pronto para evoluir?<br>Acesse sua Jornada Fluente e revise seu vocabulário.
    </p>

    <button id="btn-dash" class="btn btn-primary">Abrir Dashboard 🚀</button>

    <p class="tip">
      Pressione <strong>O</strong> em qualquer player de vídeo para capturar frases.
    </p>

    <script type="module" src="popup.js"></script>
  </body>
</html>
