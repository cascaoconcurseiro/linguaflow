<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verificar Banco de Dados</title>
    <style>
        body { font-family: monospace; background: #0F172A; color: #F8FAFC; padding: 20px; }
        h2 { color: #38BDF8; }
        pre { background: #1E293B; padding: 15px; border-radius: 8px; overflow: auto; }
        .ok { color: #10B981; }
        .err { color: #EF4444; }
        .warn { color: #F59E0B; }
        button { background: #38BDF8; color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 5px; }
    </style>
</head>
<body>
    <h2>🔍 Verificar Banco LinguaFlowFreeDB</h2>
    <button onclick="checkDB()">Verificar Banco</button>
    <button onclick="clearDB()">⚠️ Limpar Banco (CUIDADO!)</button>
    <div id="output"></div>

    <script>
    function log(msg, type = '') {
        const div = document.getElementById('output');
        div.innerHTML += `<pre class="${type}">${msg}</pre>`;
    }

    async function checkDB() {
        document.getElementById('output').innerHTML = '';
        log('Abrindo banco LinguaFlowFreeDB...', 'warn');
        
        try {
            const db = await new Promise((resolve, reject) => {
                const req = indexedDB.open('LinguaFlowFreeDB', 3);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
                req.onupgradeneeded = (e) => {
                    log('⚠️ Banco sendo criado/atualizado (versão ' + e.oldVersion + ' → ' + e.newVersion + ')', 'warn');
                };
            });
            
            log('✅ Banco aberto! Versão: ' + db.version, 'ok');
            log('Stores disponíveis: ' + Array.from(db.objectStoreNames).join(', '), 'ok');
            
            // Conta registros em cada store
            const stores = Array.from(db.objectStoreNames);
            for (const storeName of stores) {
                try {
                    const count = await new Promise((resolve, reject) => {
                        const tx = db.transaction(storeName, 'readonly');
                        const req = tx.objectStore(storeName).count();
                        req.onsuccess = () => resolve(req.result);
                        req.onerror = () => reject(req.error);
                    });
                    log(`  ${storeName}: ${count} registros`, count > 0 ? 'ok' : 'warn');
                } catch(e) {
                    log(`  ${storeName}: ERRO - ${e.message}`, 'err');
                }
            }
            
            // Mostra as palavras
            try {
                const words = await new Promise((resolve, reject) => {
                    const tx = db.transaction('words', 'readonly');
                    const req = tx.objectStore('words').getAll();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
                
                if (words.length > 0) {
                    log('\n📚 PALAVRAS SALVAS (' + words.length + '):', 'ok');
                    words.forEach((w, i) => {
                        log(`  ${i+1}. "${w.word}" (${w.lang}) → "${w.translation}" | ID: ${w.id} | deck: ${w.deck_id}`, 'ok');
                    });
                } else {
                    log('\n⚠️ NENHUMA PALAVRA ENCONTRADA no banco!', 'warn');
                    log('Isso explica por que o popup mostra 0.', 'warn');
                    log('\nPossíveis causas:', 'warn');
                    log('1. As palavras foram salvas em um banco DIFERENTE', 'warn');
                    log('2. O banco foi limpo', 'warn');
                    log('3. Há um erro no salvamento', 'warn');
                }
                
                // Mostra cards
                const cards = await new Promise((resolve, reject) => {
                    const tx = db.transaction('cards', 'readonly');
                    const req = tx.objectStore('cards').getAll();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
                
                if (cards.length > 0) {
                    log('\n🃏 CARDS (' + cards.length + '):', 'ok');
                    cards.forEach((c, i) => {
                        log(`  ${i+1}. word_id: ${c.word_id} | status: ${c.status} | due: ${new Date(c.due_date).toLocaleDateString()}`, 'ok');
                    });
                }
                
            } catch(e) {
                log('Erro ao ler palavras: ' + e.message, 'err');
            }
            
            // Verifica outros bancos possíveis
            log('\n🔍 Verificando outros bancos IndexedDB...', 'warn');
            
        } catch(e) {
            log('❌ ERRO ao abrir banco: ' + e.message, 'err');
            log('Isso pode significar que o banco não existe ainda.', 'warn');
        }
    }
    
    async function clearDB() {
        if (!confirm('CUIDADO! Isso vai apagar TODOS os dados. Tem certeza?')) return;
        
        const req = indexedDB.deleteDatabase('LinguaFlowFreeDB');
        req.onsuccess = () => {
            log('✅ Banco apagado! Recarregue a extensão.', 'ok');
        };
        req.onerror = () => {
            log('❌ Erro ao apagar banco', 'err');
        };
    }
    
    // Executa automaticamente
    checkDB();
    </script>
</body>
</html>
