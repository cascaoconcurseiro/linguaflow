<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste IndexedDB - LinguaFlow</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0F172A;
            color: #F1F5F9;
        }
        h1 { color: #38BDF8; }
        button {
            background: #38BDF8;
            color: #0F172A;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin: 5px;
        }
        button:hover { background: #0EA5E9; }
        #log {
            background: #1E293B;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { color: #10B981; }
        .error { color: #EF4444; }
        .info { color: #38BDF8; }
    </style>
</head>
<body>
    <h1>🧪 Teste IndexedDB - LinguaFlow</h1>
    <p>Use este teste para verificar se o banco de dados está funcionando corretamente.</p>
    
    <div>
        <button onclick="testInit()">1. Inicializar DB</button>
        <button onclick="testSaveWord()">2. Salvar Palavra</button>
        <button onclick="testGetWords()">3. Listar Palavras</button>
        <button onclick="testGetCards()">4. Listar Cards</button>
        <button onclick="clearLog()">Limpar Log</button>
    </div>
    
    <div id="log"></div>

    <script>
        const DB_NAME = 'LinguaFlowFreeDB';
        const DB_VERSION = 3;
        let db = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div class="${type}">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function testInit() {
            log('Iniciando teste de inicialização...', 'info');
            
            try {
                db = await new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    
                    request.onupgradeneeded = (e) => {
                        log('Criando/atualizando estrutura do banco...', 'info');
                        const db = e.target.result;
                        
                        if (!db.objectStoreNames.contains('words')) {
                            const store = db.createObjectStore('words', { keyPath: 'id', autoIncrement: true });
                            store.createIndex('word_lang', ['word', 'lang'], { unique: true });
                            store.createIndex('deck_id', 'deck_id', { unique: false });
                            log('✓ Store "words" criado', 'success');
                        }
                        
                        if (!db.objectStoreNames.contains('cards')) {
                            const store = db.createObjectStore('cards', { keyPath: 'id', autoIncrement: true });
                            store.createIndex('word_id', 'word_id', { unique: true });
                            store.createIndex('due_date', 'due_date', { unique: false });
                            store.createIndex('status', 'status', { unique: false });
                            log('✓ Store "cards" criado', 'success');
                        }
                        
                        if (!db.objectStoreNames.contains('decks')) {
                            db.createObjectStore('decks', { keyPath: 'id', autoIncrement: true });
                            log('✓ Store "decks" criado', 'success');
                        }
                        
                        if (!db.objectStoreNames.contains('known_words')) {
                            db.createObjectStore('known_words', { keyPath: ['word', 'lang'] });
                            log('✓ Store "known_words" criado', 'success');
                        }
                        
                        if (!db.objectStoreNames.contains('sessions')) {
                            db.createObjectStore('sessions', { keyPath: 'date' });
                            log('✓ Store "sessions" criado', 'success');
                        }
                        
                        if (!db.objectStoreNames.contains('settings')) {
                            db.createObjectStore('settings', { keyPath: 'key' });
                            log('✓ Store "settings" criado', 'success');
                        }
                    };
                    
                    request.onsuccess = (e) => {
                        log('✓ Banco de dados aberto com sucesso!', 'success');
                        resolve(e.target.result);
                    };
                    
                    request.onerror = (e) => {
                        log('✗ Erro ao abrir banco: ' + e.target.error, 'error');
                        reject(e.target.error);
                    };
                });
                
                log(`✓ DB Version: ${db.version}`, 'success');
                log(`✓ Stores: ${Array.from(db.objectStoreNames).join(', ')}`, 'success');
                
            } catch(e) {
                log('✗ Erro: ' + e.message, 'error');
            }
        }

        async function testSaveWord() {
            if (!db) {
                log('✗ Banco não inicializado! Execute teste 1 primeiro.', 'error');
                return;
            }
            
            log('Salvando palavra de teste...', 'info');
            
            try {
                const wordData = {
                    word: 'test',
                    lang: 'en',
                    translation: 'teste',
                    ipa: '/test/',
                    audio_url: '',
                    part_of_speech: 'noun',
                    cefr_guess: 'A1',
                    frequency_rank: 'top-1k',
                    context_sentence: 'This is a test.',
                    deck_id: 1,
                    video_url: 'https://youtube.com/test',
                    timestamp: 0,
                    platform: 'youtube',
                    added_at: Date.now()
                };
                
                await new Promise((resolve, reject) => {
                    const tx = db.transaction(['words', 'cards', 'decks'], 'readwrite');
                    
                    // Criar deck default
                    const deckReq = tx.objectStore('decks').get(1);
                    deckReq.onsuccess = () => {
                        if (!deckReq.result) {
                            tx.objectStore('decks').put({ id: 1, name: 'Default Deck', created_at: Date.now() });
                            log('✓ Deck default criado', 'success');
                        }
                    };
                    
                    // Salvar palavra
                    const wordReq = tx.objectStore('words').put(wordData);
                    wordReq.onsuccess = (e) => {
                        const wordId = e.target.result;
                        log(`✓ Palavra salva com ID: ${wordId}`, 'success');
                        
                        // Criar card
                        const card = {
                            word_id: wordId,
                            interval: 0,
                            ease_factor: 2.5,
                            due_date: Date.now(),
                            reps: 0,
                            lapses: 0,
                            status: 'new'
                        };
                        
                        const cardReq = tx.objectStore('cards').put(card);
                        cardReq.onsuccess = (e) => {
                            log(`✓ Card criado com ID: ${e.target.result}`, 'success');
                        };
                    };
                    
                    tx.oncomplete = () => {
                        log('✓ Transação completa!', 'success');
                        resolve();
                    };
                    
                    tx.onerror = () => {
                        log('✗ Erro na transação: ' + tx.error, 'error');
                        reject(tx.error);
                    };
                });
                
            } catch(e) {
                log('✗ Erro: ' + e.message, 'error');
            }
        }

        async function testGetWords() {
            if (!db) {
                log('✗ Banco não inicializado! Execute teste 1 primeiro.', 'error');
                return;
            }
            
            log('Listando palavras...', 'info');
            
            try {
                const words = await new Promise((resolve, reject) => {
                    const tx = db.transaction('words', 'readonly');
                    const req = tx.objectStore('words').getAll();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
                
                log(`✓ Total de palavras: ${words.length}`, 'success');
                words.forEach((w, i) => {
                    log(`  ${i+1}. ${w.word} (${w.lang}) = ${w.translation}`, 'info');
                });
                
            } catch(e) {
                log('✗ Erro: ' + e.message, 'error');
            }
        }

        async function testGetCards() {
            if (!db) {
                log('✗ Banco não inicializado! Execute teste 1 primeiro.', 'error');
                return;
            }
            
            log('Listando cards...', 'info');
            
            try {
                const cards = await new Promise((resolve, reject) => {
                    const tx = db.transaction('cards', 'readonly');
                    const req = tx.objectStore('cards').getAll();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
                
                log(`✓ Total de cards: ${cards.length}`, 'success');
                cards.forEach((c, i) => {
                    log(`  ${i+1}. Card ID ${c.id} - Word ID ${c.word_id} - Status: ${c.status}`, 'info');
                });
                
            } catch(e) {
                log('✗ Erro: ' + e.message, 'error');
            }
        }

        // Auto-inicializar
        window.onload = () => {
            log('Página carregada. Clique em "1. Inicializar DB" para começar.', 'info');
        };
    </script>
</body>
</html>
