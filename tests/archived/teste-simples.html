<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Teste Simples - LinguaFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.9);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #38bdf8, #7dd3fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
            text-align: center;
        }
        .log {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.8;
            max-height: 600px;
            overflow-y: auto;
        }
        .log-item {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 6px;
        }
        .log-item.success {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
        }
        .log-item.error {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
        }
        .log-item.info {
            background: rgba(56, 189, 248, 0.1);
            color: #7dd3fc;
        }
        .log-item.warning {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Teste Simples</h1>
        <p class="subtitle">Mostrando EXATAMENTE onde está o erro</p>

        <div class="log" id="log"></div>
    </div>

    <script>
        const log = document.getElementById('log');

        function addLog(message, type = 'info') {
            const item = document.createElement('div');
            item.className = `log-item ${type}`;
            item.textContent = message;
            log.appendChild(item);
            log.scrollTop = log.scrollHeight;
        }

        async function runTest() {
            addLog('🚀 Iniciando teste...', 'info');
            addLog('', 'info');

            // ═══════════════════════════════════════════════════════
            // TESTE 1: Verificar se chrome.runtime existe
            // ═══════════════════════════════════════════════════════
            try {
                if (typeof chrome !== 'undefined' && chrome.runtime) {
                    addLog('✅ chrome.runtime existe', 'success');
                    addLog(`   ID da extensão: ${chrome.runtime.id}`, 'info');
                } else {
                    addLog('❌ chrome.runtime NÃO existe', 'error');
                    addLog('   Você está abrindo o arquivo diretamente?', 'warning');
                    addLog('   Use: chrome-extension://[ID]/tests/teste-simples.html', 'warning');
                    return;
                }
            } catch (e) {
                addLog(`❌ Erro ao verificar chrome.runtime: ${e.message}`, 'error');
                return;
            }

            addLog('', 'info');

            // ═══════════════════════════════════════════════════════
            // TESTE 2: Verificar URL do db.js
            // ═══════════════════════════════════════════════════════
            try {
                const BASE = chrome.runtime.getURL('utils/');
                addLog(`✅ URL base: ${BASE}`, 'success');
                
                const dbUrl = chrome.runtime.getURL('utils/db.js');
                addLog(`✅ URL do db.js: ${dbUrl}`, 'success');
            } catch (e) {
                addLog(`❌ Erro ao gerar URL: ${e.message}`, 'error');
                return;
            }

            addLog('', 'info');

            // ═══════════════════════════════════════════════════════
            // TESTE 3: Tentar importar db.js
            // ═══════════════════════════════════════════════════════
            try {
                addLog('⏳ Tentando importar db.js...', 'info');
                const BASE = chrome.runtime.getURL('utils/');
                const { db } = await import(BASE + 'db.js');
                addLog('✅ db.js importado com sucesso!', 'success');
                addLog(`   Tipo: ${typeof db}`, 'info');
                addLog(`   Métodos: ${Object.getOwnPropertyNames(Object.getPrototypeOf(db)).join(', ')}`, 'info');
            } catch (e) {
                addLog(`❌ ERRO ao importar db.js: ${e.message}`, 'error');
                addLog(`   Stack: ${e.stack}`, 'error');
                addLog('', 'info');
                addLog('🔍 POSSÍVEIS CAUSAS:', 'warning');
                addLog('   1. Arquivo db.js não existe em utils/', 'warning');
                addLog('   2. Erro de sintaxe no db.js', 'warning');
                addLog('   3. Problema no manifest.json (web_accessible_resources)', 'warning');
                return;
            }

            addLog('', 'info');

            // ═══════════════════════════════════════════════════════
            // TESTE 4: Tentar abrir IndexedDB
            // ═══════════════════════════════════════════════════════
            try {
                addLog('⏳ Tentando abrir IndexedDB...', 'info');
                const BASE = chrome.runtime.getURL('utils/');
                const { db } = await import(BASE + 'db.js');
                
                await db.initPromise;
                addLog('✅ IndexedDB aberto com sucesso!', 'success');
            } catch (e) {
                addLog(`❌ ERRO ao abrir IndexedDB: ${e.message}`, 'error');
                addLog(`   Stack: ${e.stack}`, 'error');
                return;
            }

            addLog('', 'info');

            // ═══════════════════════════════════════════════════════
            // TESTE 5: Tentar salvar palavra
            // ═══════════════════════════════════════════════════════
            try {
                addLog('⏳ Tentando salvar palavra...', 'info');
                const BASE = chrome.runtime.getURL('utils/');
                const { db } = await import(BASE + 'db.js');
                
                const result = await db.saveWord({
                    word: 'test_simple',
                    lang: 'en',
                    translation: 'teste simples',
                    phonetic: '/test/',
                    definition: 'A simple test',
                    context_sentence: 'This is a simple test.',
                    video_url: 'https://youtube.com/test',
                    video_title: 'Test Video',
                    platform: 'youtube',
                    deck_id: 1,
                    added_at: Date.now()
                });
                
                addLog('✅ Palavra salva com sucesso!', 'success');
                addLog(`   ID: ${result.id}`, 'info');
                addLog(`   Nova: ${result.isNew}`, 'info');
            } catch (e) {
                addLog(`❌ ERRO ao salvar palavra: ${e.message}`, 'error');
                addLog(`   Stack: ${e.stack}`, 'error');
                return;
            }

            addLog('', 'info');

            // ═══════════════════════════════════════════════════════
            // TESTE 6: Tentar ler palavra
            // ═══════════════════════════════════════════════════════
            try {
                addLog('⏳ Tentando ler palavra...', 'info');
                const BASE = chrome.runtime.getURL('utils/');
                const { db } = await import(BASE + 'db.js');
                
                const word = await db.getWord('test_simple', 'en');
                
                if (word) {
                    addLog('✅ Palavra lida com sucesso!', 'success');
                    addLog(`   Palavra: ${word.word}`, 'info');
                    addLog(`   Tradução: ${word.translation}`, 'info');
                } else {
                    addLog('❌ Palavra NÃO encontrada após salvar', 'error');
                }
            } catch (e) {
                addLog(`❌ ERRO ao ler palavra: ${e.message}`, 'error');
                addLog(`   Stack: ${e.stack}`, 'error');
                return;
            }

            addLog('', 'info');

            // ═══════════════════════════════════════════════════════
            // TESTE 7: Tentar ler todas as palavras
            // ═══════════════════════════════════════════════════════
            try {
                addLog('⏳ Tentando ler todas as palavras...', 'info');
                const BASE = chrome.runtime.getURL('utils/');
                const { db } = await import(BASE + 'db.js');
                
                const words = await db.getAllWords();
                
                addLog(`✅ ${words.length} palavras no DB`, 'success');
                
                if (words.length > 0) {
                    addLog('   Primeiras 5 palavras:', 'info');
                    words.slice(0, 5).forEach(w => {
                        addLog(`   - ${w.word} = ${w.translation}`, 'info');
                    });
                }
            } catch (e) {
                addLog(`❌ ERRO ao ler palavras: ${e.message}`, 'error');
                addLog(`   Stack: ${e.stack}`, 'error');
                return;
            }

            addLog('', 'info');
            addLog('🎉 TODOS OS TESTES PASSARAM!', 'success');
            addLog('', 'info');
            addLog('📊 CONCLUSÃO:', 'info');
            addLog('   ✅ Sistema funcionando corretamente', 'success');
            addLog('   ✅ Palavras estão sendo salvas', 'success');
            addLog('   ✅ Palavras estão sendo lidas', 'success');
            addLog('', 'info');
            addLog('🔍 PRÓXIMO PASSO:', 'warning');
            addLog('   Abra o Dashboard e veja se as palavras aparecem lá', 'warning');
            addLog(`   URL: chrome-extension://${chrome.runtime.id}/dashboard/dashboard.html`, 'warning');
        }

        // Executa automaticamente ao carregar
        window.addEventListener('load', () => {
            setTimeout(runTest, 500);
        });
    </script>
</body>
</html>
